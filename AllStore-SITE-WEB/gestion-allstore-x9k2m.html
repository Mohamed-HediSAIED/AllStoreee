<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="shopping_bag_icon.png">
  <title>Admin | ALLSTORE 24/7</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body{font-family:'Poppins',sans-serif;background:var(--bg2,#f5f2ec);color:var(--noir,#0a1923)}
    .admin-wrap{max-width:900px;margin:0 auto;padding:120px 20px 60px}
    .admin-title{font-size:28px;font-weight:700;margin-bottom:8px}
    .admin-sub{font-size:14px;color:var(--gris);margin-bottom:32px}

    /* Login */
    .admin-login{max-width:400px;margin:120px auto;text-align:center;padding:0 20px}
    .admin-login h1{font-size:24px;font-weight:700;margin-bottom:24px}
    .admin-input{width:100%;padding:14px 20px;border-radius:12px;border:1.5px solid rgba(10,25,35,.15);font-family:'Poppins',sans-serif;font-size:14px;outline:none;transition:border .2s;background:#fff;box-sizing:border-box}
    .admin-input:focus{border-color:var(--noir)}
    .admin-btn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--noir,#0a1923);color:#fff;font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px;transition:background .2s}
    .admin-btn:hover{background:#1a3040}
    .admin-btn:disabled{opacity:.5;cursor:wait}
    .admin-error{color:#e74c3c;font-size:13px;margin-top:12px;display:none}

    /* Dashboard */
    .admin-dash{display:none}
    .admin-stats{display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap}
    .stat-card{background:#fff;border-radius:16px;padding:24px;flex:1;min-width:200px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
    .stat-num{font-size:36px;font-weight:700;color:var(--noir)}
    .stat-label{font-size:12px;color:var(--gris);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}

    /* Table */
    .admin-table-wrap{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.04);margin-bottom:32px}
    .admin-table{width:100%;border-collapse:collapse}
    .admin-table th{text-align:left;padding:14px 18px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gris);border-bottom:1px solid rgba(10,25,35,.08);background:var(--bg2)}
    .admin-table td{padding:12px 18px;font-size:13px;border-bottom:1px solid rgba(10,25,35,.04)}
    .admin-table tr:last-child td{border-bottom:none}
    .badge-signup{background:#e8f5e9;color:#2e7d32;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px}
    .badge-purchase{background:#fff3e0;color:#e65100;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px}

    /* Bulk email */
    .admin-email-form{background:#fff;border-radius:16px;padding:28px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
    .admin-email-form h3{font-size:16px;font-weight:700;margin:0 0 20px}
    .admin-email-form label{font-size:12px;font-weight:600;color:var(--gris);display:block;margin-bottom:6px}
    .admin-email-form input,.admin-email-form textarea{width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid rgba(10,25,35,.12);font-family:'Poppins',sans-serif;font-size:13px;outline:none;margin-bottom:16px;box-sizing:border-box;transition:border .2s}
    .admin-email-form input:focus,.admin-email-form textarea:focus{border-color:var(--noir)}
    .admin-email-form textarea{min-height:150px;resize:vertical}
    .admin-msg{font-size:13px;margin-top:12px;padding:10px 14px;border-radius:10px;display:none}
    .admin-msg.success{display:block;background:#e8f5e9;color:#2e7d32}
    .admin-msg.error{display:block;background:#fce4ec;color:#c62828}

    @media(max-width:600px){
      .admin-wrap{padding:100px 16px 40px}
      .stat-card{min-width:100%}
      .admin-table th,.admin-table td{padding:10px 12px;font-size:12px}
    }
  </style>
  </head>
<body>
<header class="header-dark"><nav><a href="index.html" class="logo"><img src="shopping_bag_icon.png" alt="ALLSTORE"></a><ul class="nav-links"><li><a href="index.html">Accueil</a></li></ul></nav></header>

<!-- LOGIN -->
<div class="admin-login" id="admin-login">
  <h1>Admin AllStore</h1>
  <input type="password" class="admin-input" id="admin-pwd" placeholder="Mot de passe admin" onkeydown="if(event.key==='Enter')adminLogin()">
  <button class="admin-btn" onclick="adminLogin()">Connexion</button>
  <p class="admin-error" id="login-error">Mot de passe incorrect</p>
</div>

<!-- DASHBOARD -->
<div class="admin-wrap admin-dash" id="admin-dash">
  <h1 class="admin-title">Dashboard</h1>
  <p class="admin-sub">Gestion des clients AllStore</p>

  <div class="admin-stats">
    <div class="stat-card">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Clients inscrits</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-signup">—</div>
      <div class="stat-label">Via inscription</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-purchase">—</div>
      <div class="stat-label">Via achat</div>
    </div>
  </div>

  <div class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr><th>Email</th><th>Source</th><th>Date</th></tr>
      </thead>
      <tbody id="clients-tbody"></tbody>
    </table>
  </div>

  <div class="admin-email-form">
    <h3>Envoyer un email a tous les clients</h3>
    <label>Sujet</label>
    <input type="text" id="email-subject" placeholder="Ex: Nouvelles pieces disponibles !">
    <label>Contenu (HTML)</label>
    <textarea id="email-body" placeholder="<h2>Bonjour !</h2><p>De nouvelles pieces sont disponibles sur AllStore...</p>"></textarea>
    <button class="admin-btn" id="send-btn" onclick="sendBulkEmail()">Envoyer a tous les clients</button>
    <div class="admin-msg" id="send-msg"></div>
  </div>
</div>

<script>
var adminPwd = '';

function adminLogin() {
  adminPwd = document.getElementById('admin-pwd').value;
  if (!adminPwd) return;
  var btn = document.querySelector('#admin-login .admin-btn');
  btn.disabled = true;
  btn.textContent = 'Connexion...';

  fetch('/api/list-clients', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ password: adminPwd })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    btn.disabled = false;
    btn.textContent = 'Connexion';
    if (data.error) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    sessionStorage.setItem('admin_pwd', adminPwd);
    document.getElementById('admin-login').style.display = 'none';
    document.getElementById('admin-dash').style.display = 'block';
    renderDashboard(data);
  })
  .catch(function() {
    btn.disabled = false;
    btn.textContent = 'Connexion';
    document.getElementById('login-error').style.display = 'block';
  });
}

function renderDashboard(data) {
  var clients = data.clients || [];
  var signups = clients.filter(function(c) { return c.source === 'signup'; }).length;
  var purchases = clients.filter(function(c) { return c.source === 'purchase'; }).length;

  document.getElementById('stat-total').textContent = data.total;
  document.getElementById('stat-signup').textContent = signups;
  document.getElementById('stat-purchase').textContent = purchases;

  var tbody = document.getElementById('clients-tbody');
  tbody.innerHTML = '';
  clients.forEach(function(c) {
    var tr = document.createElement('tr');
    var badge = c.source === 'purchase' ? 'badge-purchase' : 'badge-signup';
    var label = c.source === 'purchase' ? 'Achat' : 'Inscription';
    var date = new Date(c.created_at).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
    tr.innerHTML = '<td>' + c.email + '</td><td><span class="' + badge + '">' + label + '</span></td><td>' + date + '</td>';
    tbody.appendChild(tr);
  });
}

function sendBulkEmail() {
  var subject = document.getElementById('email-subject').value;
  var body = document.getElementById('email-body').value;
  var msg = document.getElementById('send-msg');
  var btn = document.getElementById('send-btn');

  if (!subject || !body) {
    msg.className = 'admin-msg error';
    msg.textContent = 'Remplis le sujet et le contenu';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Envoi en cours...';
  msg.className = 'admin-msg';
  msg.style.display = 'none';

  fetch('/api/send-bulk-email', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ password: adminPwd, subject: subject, htmlBody: body })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    btn.disabled = false;
    btn.textContent = 'Envoyer a tous les clients';
    if (data.error) {
      msg.className = 'admin-msg error';
      msg.textContent = data.error;
    } else {
      msg.className = 'admin-msg success';
      msg.textContent = 'Email envoye a ' + data.sent + ' client(s) sur ' + data.total;
    }
  })
  .catch(function() {
    btn.disabled = false;
    btn.textContent = 'Envoyer a tous les clients';
    msg.className = 'admin-msg error';
    msg.textContent = 'Erreur de connexion';
  });
}

// Auto-login if password saved in session
(function() {
  var saved = sessionStorage.getItem('admin_pwd');
  if (saved) {
    document.getElementById('admin-pwd').value = saved;
    adminLogin();
  }
})();
</script>
</body>
</html>
