<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <!-- Apple SF Symbols-inspired icon sprite
       Usage : <svg class="ap-icon"><use href="apple/icons.svg#icon-name"/></svg>
       Default stroke-width 2, fill none, round caps for that SF feel -->

  <!-- Navigation -->
  <symbol id="ic-house" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 10.5 12 3l9 7.5V20a1.5 1.5 0 0 1-1.5 1.5h-4v-6h-7v6h-4A1.5 1.5 0 0 1 3 20z"/>
  </symbol>
  <symbol id="ic-house-fill" viewBox="0 0 24 24" fill="currentColor">
    <path d="M3.3 10.2 12 3l8.7 7.2c.2.15.3.4.3.65V20a1.5 1.5 0 0 1-1.5 1.5h-4.2v-5.5c0-.55-.45-1-1-1h-4.6c-.55 0-1 .45-1 1v5.5H4.5A1.5 1.5 0 0 1 3 20v-9.15c0-.25.1-.5.3-.65z"/>
  </symbol>

  <symbol id="ic-bag" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 8h14l-1 12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2z"/>
    <path d="M8 8V6a4 4 0 1 1 8 0v2"/>
  </symbol>
  <symbol id="ic-bag-fill" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 2a4 4 0 0 1 4 4v2h3.5l-1 12.15A2 2 0 0 1 16.5 22h-9a2 2 0 0 1-2-1.85L4.5 8H8V6a4 4 0 0 1 4-4zm0 1.8A2.2 2.2 0 0 0 9.8 6v2h4.4V6A2.2 2.2 0 0 0 12 3.8z"/>
  </symbol>

  <symbol id="ic-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="7"/>
    <path d="m20 20-3.5-3.5"/>
  </symbol>

  <symbol id="ic-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 20.5c-1-.7-7.5-5.4-8.5-9.3A4.8 4.8 0 0 1 7.8 5.3c1.7 0 3.3.8 4.2 2.1.9-1.3 2.5-2.1 4.2-2.1a4.8 4.8 0 0 1 4.3 5.9c-1 3.9-7.5 8.6-8.5 9.3z"/>
  </symbol>
  <symbol id="ic-heart-fill" viewBox="0 0 24 24" fill="currentColor">
    <path d="M12 20.5c-1.1-.75-7.6-5.5-8.6-9.4A4.8 4.8 0 0 1 7.8 5.1c1.7 0 3.3.85 4.2 2.15.9-1.3 2.5-2.15 4.2-2.15a4.8 4.8 0 0 1 4.4 6c-1 3.9-7.5 8.65-8.6 9.4z"/>
  </symbol>

  <symbol id="ic-person" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="8" r="4"/>
    <path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
  </symbol>
  <symbol id="ic-person-fill" viewBox="0 0 24 24" fill="currentColor">
    <circle cx="12" cy="8" r="4.5"/>
    <path d="M4 21.5c0-4.7 3.6-8.5 8-8.5s8 3.8 8 8.5z"/>
  </symbol>

  <!-- Chevrons -->
  <symbol id="ic-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </symbol>
  <symbol id="ic-chevron-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </symbol>
  <symbol id="ic-chevron-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"/>
  </symbol>
  <symbol id="ic-chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="6 9 12 15 18 9"/>
  </symbol>

  <!-- Actions -->
  <symbol id="ic-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/>
    <line x1="6" y1="6" x2="18" y2="18"/>
  </symbol>
  <symbol id="ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </symbol>
  <symbol id="ic-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="5" x2="12" y2="19"/>
    <line x1="5" y1="12" x2="19" y2="12"/>
  </symbol>
  <symbol id="ic-minus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="5" y1="12" x2="19" y2="12"/>
  </symbol>

  <!-- Theme -->
  <symbol id="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="4"/>
    <path d="M12 3v2M12 19v2M5 12H3M21 12h-2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4"/>
  </symbol>
  <symbol id="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>
  </symbol>

  <!-- Communication -->
  <symbol id="ic-bubble" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12a8 8 0 0 1-11 7.4L4 21l1.6-5.5A8 8 0 1 1 21 12z"/>
  </symbol>
  <symbol id="ic-bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
    <path d="M14 21a2 2 0 0 1-4 0"/>
  </symbol>
  <symbol id="ic-arrow-forward" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="5" y1="12" x2="19" y2="12"/>
    <polyline points="12 5 19 12 12 19"/>
  </symbol>

  <!-- Location / delivery -->
  <symbol id="ic-location" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/>
    <circle cx="12" cy="10" r="3"/>
  </symbol>
  <symbol id="ic-truck" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="1" y="6" width="15" height="11" rx="1.5"/>
    <path d="M16 10h4l3 4v3h-7z"/>
    <circle cx="6" cy="19" r="2"/>
    <circle cx="18" cy="19" r="2"/>
  </symbol>

  <!-- Misc -->
  <symbol id="ic-sparkles" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5 18 18M6 18l2.5-2.5M15.5 8.5 18 6"/>
  </symbol>
  <symbol id="ic-star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 2 15.1 8.6 22 9.6 17 14.5 18.2 21.4 12 18.1 5.8 21.4 7 14.5 2 9.6 8.9 8.6 12 2"/>
  </symbol>
  <symbol id="ic-star-fill" viewBox="0 0 24 24" fill="currentColor">
    <polygon points="12 2 15.1 8.6 22 9.6 17 14.5 18.2 21.4 12 18.1 5.8 21.4 7 14.5 2 9.6 8.9 8.6 12 2"/>
  </symbol>

  <!-- WhatsApp (brand icon, pour CTA assistant) -->
  <symbol id="ic-whatsapp" viewBox="0 0 24 24" fill="currentColor">
    <path d="M17.5 14.4c-.3-.15-1.8-.9-2.1-1s-.5-.15-.7.15-.8 1-1 1.2-.4.2-.7.05a8.2 8.2 0 0 1-2.4-1.5 9.1 9.1 0 0 1-1.7-2.1c-.2-.3 0-.45.15-.6.15-.15.3-.4.45-.6s.2-.3.3-.5.05-.4-.05-.55-.7-1.65-.9-2.25-.5-.5-.7-.5l-.6-.05c-.2 0-.55.1-.85.4a2.9 2.9 0 0 0-.9 2.1c0 1.25.9 2.45 1.05 2.6a10.6 10.6 0 0 0 4.05 3.5c.55.25 1 .4 1.35.5.55.2 1.05.15 1.45.1.45-.05 1.4-.55 1.6-1.1.2-.55.2-1 .15-1.1-.05-.1-.2-.15-.5-.3zM12 22a10 10 0 0 1-4.5-1l-5 1.3 1.3-4.85A10 10 0 1 1 12 22z"/>
  </symbol>

  <!-- Hamburger / menu -->
  <symbol id="ic-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="3" y1="7" x2="21" y2="7"/>
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="3" y1="17" x2="21" y2="17"/>
  </symbol>
</svg>
