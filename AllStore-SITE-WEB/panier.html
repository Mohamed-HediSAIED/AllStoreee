<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Votre panier ALLSTORE 24/7. Finalisez votre commande de pièces authentiques avec livraison offerte dès 150€.">
  <meta property="og:title" content="ALLSTORE 24/7 — Sourcing d'Exception">
  <meta property="og:description" content="Votre panier ALLSTORE 24/7. Finalisez votre commande de pièces authentiques avec livraison offerte dès 150€.">
  <meta property="og:type" content="website">

  <title>Panier | ALLSTORE 24/7</title>

  <link rel="stylesheet" href="conversion.css">
  <style>
    .panier-wrap {
      padding: 100px var(--marge) 140px;
      max-width: 860px;
      margin: 0 auto;
    }
    .panier-section-title {
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 600;
      letter-spacing: -.02em;
      margin: 0 0 24px;
    }
    .panier-section-title em { color: var(--gris); font-style: normal; }
    .panier-block {
      background: #fff;
      border-radius: 28px;
      padding: 32px;
      margin-bottom: 40px;
      box-shadow: 0 4px 24px rgba(0,0,0,.04);
    }
    .cart-row {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 16px 0;
      border-bottom: 1px solid rgba(10,25,35,.06);
    }
    .cart-row:last-child { border-bottom: none; }
    .cart-img {
      width: 72px; height: 72px;
      border-radius: 16px;
      background: var(--bg2);
      overflow: hidden;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .cart-img img { width: 100%; height: 100%; object-fit: cover; padding: 6px; }
    .cart-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .cart-brand {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--gris);
    }
    .cart-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--noir);
    }
    .cart-price {
      font-size: 14px;
      font-weight: 600;
      color: var(--gold2);
    }
    .btn-add-cart {
      background: var(--noir);
      color: #fff;
      border: none;
      border-radius: 980px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      white-space: nowrap;
      transition: background .2s, transform .2s;
      flex-shrink: 0;
    }
    .btn-add-cart:hover { background: #1a3040; transform: scale(1.03); }
    .btn-remove-cart {
      background: transparent;
      color: var(--gris);
      border: 1px solid rgba(10,25,35,.15);
      border-radius: 980px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      white-space: nowrap;
      transition: all .2s;
      flex-shrink: 0;
    }
    .btn-remove-cart:hover { border-color: #c0392b; color: #c0392b; }
    .wl-empty {
      text-align: center;
      color: var(--gris);
      font-size: 15px;
      padding: 32px 0;
      line-height: 1.6;
    }
    .cart-checkout-btn {
      display: block;
      width: 100%;
      background: var(--gold);
      color: var(--noir);
      border: none;
      border-radius: 18px;
      padding: 20px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      text-decoration: none;
      transition: background .2s, transform .2s;
      margin-top: 24px;
    }
    .cart-checkout-btn:hover { background: var(--gold2); transform: scale(1.01); }
    /* Mobile */
    @media(max-width:768px){
      .cart-row { flex-wrap: wrap; gap: 12px; padding: 18px 16px; }
      .cart-img { width: 60px; height: 60px; }
      .cart-info { flex: 1; min-width: 0; }
      .cart-brand { font-size: 10px; }
      .cart-name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .btn-add-cart, .btn-remove-cart { width: 100%; text-align: center; font-size: 13px; padding: 12px 16px; }
      .cart-checkout-btn { font-size: 15px; padding: 16px; }
    }
  </style>
</head>
<body>

<main class="panier-wrap">

    <div class="foot-links">
      <a href="apropos.html">À Propos</a>

    </div>

</footer>

<script src="global.js"></script>
<script src="luxury.js"></script>
<script src="conversion.js"></script>
<script>
  // Initialiser la page panier
  (function(){
    renderCartPage();
    // Afficher/masquer le bouton checkout
    function updateCheckout(){
      const btn=document.getElementById('checkout-btn');
      if(btn) btn.style.display=getCart().length?'block':'none';
    }
    // Patch addToCart pour re-render sur cette page
    const orig=window.addToCart;
    window.addToCart=function(id,brand,name,img,price){
      orig(id,brand,name,img,price);
      renderCartPage();
      updateCheckout();
    };
    updateCheckout();
  })();
</script>

<style>
  .bnav{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:9000;display:flex;align-items:center;background:rgba(255,255,255,.12);backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);border-radius:50px;padding:6px 8px;border:1px solid rgba(255,255,255,.25);box-shadow:0 4px 24px rgba(0,0,0,.15)}
  .bnav-pill{position:relative;display:flex;align-items:center}
  .bnav-blob{position:absolute;height:100%;background:rgba(255,255,255,.45);border-radius:40px;transition:left .4s cubic-bezier(.4,.0,.2,1), width .4s cubic-bezier(.4,.0,.2,1);z-index:0;pointer-events:none}
  .bnav-blob.slime{transition:left .35s cubic-bezier(.5,.0,.2,1.3), width .35s cubic-bezier(.5,.0,.2,1.3)}
  .bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 16px;border-radius:40px;text-decoration:none;color:rgba(0,0,0,.5);font-family:'Poppins',sans-serif;font-size:9px;font-weight:500;letter-spacing:.03em;transition:color .2s;cursor:pointer;white-space:nowrap;position:relative;z-index:1;background:transparent}
  .bnav-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:all .2s}
  .bnav-item:hover{color:rgba(0,0,0,.8)}
  .bnav-item.active{color:var(--noir,#0a1923)}
  .bnav-item.active svg{stroke:var(--noir,#0a1923);fill:none;stroke-width:2}
  .bnav-badge{position:absolute;top:2px;right:8px;background:#e9c243;color:#0a1923;font-size:8px;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 4px;line-height:1}
  @media(min-width:1025px){.bnav{display:none!important}}
  @media(max-width:400px){.bnav{bottom:10px;padding:4px 6px}.bnav-item{padding:6px 10px;font-size:8px;gap:2px}.bnav-item svg{width:18px;height:18px}}
</style>
<nav class="bnav">
  <div class="bnav-pill">
    <div class="bnav-blob" id="bnav-blob"></div>
    <a href="index.html" class="bnav-item" data-nav="0">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Accueil
    </a>
    <a href="assistant.html" class="bnav-item" data-nav="2">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Boutique
    </a>
    <a href="panier.html" class="bnav-item active" data-nav="3" id="bn-panier">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>
      Panier
      <span class="bnav-badge" id="bnav-badge"></span>
    </a>
    <a href="suivi.html" class="bnav-item" data-nav="4">
      <svg viewBox="0 0 24 24"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0112 2a8 8 0 018 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>
      Suivi
    </a>
  </div>
</nav>
<script>
(function(){
  var blob = document.getElementById('bnav-blob');
  var items = document.querySelectorAll('.bnav-item');
  var pill = document.querySelector('.bnav-pill');
  if(!blob || !pill || !items.length) return;
  function positionBlob(el, animate){
    var pr = pill.getBoundingClientRect();
    var er = el.getBoundingClientRect();
    if(animate) blob.classList.add('slime');
    else blob.classList.remove('slime');
    blob.style.left = (er.left - pr.left) + 'px';
    blob.style.width = er.width + 'px';
    blob.style.height = er.height + 'px';
  }
  var activeEl = document.querySelector(".bnav-item.active");
  if(activeEl){ positionBlob(activeEl, false); }
  sessionStorage.removeItem("bnav_from");
  items.forEach(function(item){
    item.addEventListener('click', function(e){
      if(item.classList.contains('active')) return;
      e.preventDefault();
      var href = item.getAttribute('href');
      var currentActive = document.querySelector('.bnav-item.active');
      sessionStorage.setItem('bnav_from', currentActive ? currentActive.dataset.nav : '0');
      positionBlob(item, true);
      items.forEach(function(i){ i.classList.remove('active'); });
      item.classList.add('active');
      setTimeout(function(){ window.location.href = href; }, 350);
    });
  });
})();
</script>

</body>
